<!DOCTYPE html>
<html>
<head>
  <title>MAASH Studio</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    .buttons button:hover {
      background: #555;
    }

    #imageContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    #imageContainer img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    #imageContainer img:hover {
      transform: scale(1.05);
    }

    #result {
      font-size: 20px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>MAASH Studio 👗</h1>
<p>Get outfit ideas for every occasion 👗</p>

<div class="buttons">
  <button onclick="generateDesign('casual')">Casual</button>
  <button onclick="generateDesign('party')">Party</button>
  <button onclick="generateDesign('wedding')">Wedding</button>
</div>

<p id="result"></p>

<div id="imageContainer"></div>

<script>
function generateDesign(occasion) {

  let container = document.getElementById("imageContainer");

  let casual = [
    "casual.jpg.jpeg",
    "casual1.jpg.jpeg",
    "casual2.jpg.jpeg",
    "casual3.jpg.jpeg",
    "casual4.jpg.jpeg"
  ];

  let party = [
    "party.jpg.jpeg",
    "party1.jpg.jpeg",
    "party2.jpg.jpeg",
    "party3.jpg.jpeg",
    "party4.jpg.jpeg"
  ];

  let wedding = [
    "wedding.jpg.jpeg",
    "wedding1.jpg.jpeg",
    "wedding2.jpg.jpeg",
    "wedding3.jpg.jpeg",
    "wedding4.jpg.jpeg"
  ];

  let selectedList;

  if (occasion === "casual") {
    selectedList = casual;
  } 
  else if (occasion === "party") {
    selectedList = party;
  } 
  else if (occasion === "wedding") {
    selectedList = wedding;
  }

  // clear old images
  container.innerHTML = "";

  // show all images
  selectedList.forEach(function(imgName) {
    let img = document.createElement("img");
    img.src = imgName;
    container.appendChild(img);
  });

  document.getElementById("result").innerText =
    "✨ Showing " + occasion + " designs";
}
</script>

</body>
</html>
